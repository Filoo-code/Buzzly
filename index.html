        * {

            padding: 0;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* ========== HEADER ========== */
        .header {
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .logo-icon {
            font-size: 2.5rem;
            animation: buzz 2s ease-in-out infinite;
        }

            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(3deg); }
            50% { transform: translate(0, -4px) rotate(0deg); }
            75% { transform: translate(-2px, -2px) rotate(-3deg); }
        }

        .logo-text {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5c542, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .tagline {
            font-size: 0.95rem;
            color: #a0a0b0;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ========== MODE TOGGLE TABS ========== */
        .mode-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 5px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .mode-tab {
            padding: 10px 28px;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            background: transparent;
            color: #a0a0b0;
        }

        .mode-tab.active {
            background: #e94560;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .mode-tab.active.joke-active {
            background: #f5c542;
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3);
        }

        /* ========== SWIPE INDICATOR ========== */
        .swipe-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0b0;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .swipe-hint span {
            font-size: 1.2rem;
        }

        /* ========== NAVIGATION COUNTER ========== */
        .nav-counter {
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* ========== CONTENT CARD ========== */
        .content-card-wrapper {
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
            border-radius: 20px;
            touch-action: pan-y;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 45px 35px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            position: relative;
            cursor: grab;
            user-select: none;
        }

        .content-card:active {
            cursor: grabbing;
        }

        .content-card.swiping {
            transition: none;
        }

        .content-card.swipe-left {
            transform: translateX(-120%);
            opacity: 0;
        }

        .content-card.swipe-right {
            transform: translateX(120%);
            opacity: 0;
        }

        .content-card.swipe-from-left {
            transform: translateX(-120%);
            opacity: 0;
            transition: none;
        }

        .content-card.swipe-from-right {
            transform: translateX(120%);
            opacity: 0;
            transition: none;
        }

        .content-card.snap-back {
            transform: translateX(0);
            opacity: 1;
        }

        .card-icon {
            font-size: 55px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .card-icon.quote-icon {
            color: #e94560;
        }

        .card-icon.joke-icon {
            color: #f5c542;
        }

        .content-text {
            font-size: 1.6rem;
            font-style: italic;
            font-weight: 500;
            line-height: 1.5;
            color: #f0f0f0;
            margin: 12px 0;
            transition: opacity 0.4s ease;
        }

        .content-subtext {
            font-size: 1.05rem;
            color: #a0a0b0;
            font-weight: 500;
            margin-top: 8px;
        }

        .joke-punchline {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f5c542;
            margin-top: 12px;
            font-style: normal;
            transition: opacity 0.4s ease;
        }

        /* ========== LOADING INDICATOR ========== */
        .loading-spinner {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(233, 69, 96, 0.2);
            border-top: 3px solid #e94560;
            border-radius: 50%;
            margin: 8px auto;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== NAV ARROWS ========== */
        .nav-arrows {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 5px;
        }

        .nav-arrow {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #a0a0b0;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .nav-arrow:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            color: white;
            transform: scale(1.1);
        }

        .nav-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .nav-arrow:disabled:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #a0a0b0;
        }

        /* ========== BUTTONS ========== */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 16px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: #e94560;
            color: white;
            box-shadow: 0 4px 18px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            background: #d63851;
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(233, 69, 96, 0.6);
        }

        .btn-primary:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-joke {
            background: #f5c542;
            color: #1a1a2e;
            box-shadow: 0 4px 18px rgba(245, 197, 66, 0.4);
        }

        .btn-joke:hover {
            background: #e0b23a;
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(245, 197, 66, 0.6);
        }

        .btn-joke:disabled {
            background: #666;
            color: white;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #a0a0b0;
            border: 2px solid #a0a0b0;
        }

        .btn-secondary:hover {
            color: white;
            border-color: white;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.08);
            color: #a0a0b0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4ade80;
            color: #4ade80;
            transform: translateY(-2px);
        }

        .btn-copy.copied {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
            color: #4ade80;
            animation: copyPulse 0.6s ease;
        }

        @keyframes copyPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ========== TOAST NOTIFICATION ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #4ade80;
            color: #1a1a2e;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 1px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== AD PLACEHOLDER ========== */

        /* ========== FOOTER ========== */

        }

        /* ========== RESPONSIVE DESIGN ========== */

            }

            .content-card {

            }

                font-size: 0.8rem;
            }

            .nav-arrow {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }

            .button-group {
                gap: 8px;
            }
        }
    </style>

            { text: "Three things cannot be long hidden: the sun, the moon, and the truth.", author: "Buddha" },
            { text: "The shoe that fits one person pinches another; there is no recipe for living that suits all cases.", author: "Carl Jung" },
            { text: "Knowing your own darkness is the best method for dealing with the darknesses of other people.", author: "Carl Jung" },
            { text: "The privilege of a lifetime is to become who you truly are.", author: "Carl Jung" },
            { text: "Who looks outside, dreams; who looks inside, awakes.", author: "Carl Jung" },
            { text: "The greatest discovery of my generation is that a human being can alter his life by altering his attitudes.", author: "William James" },
            { text: "Action may not always bring happiness, but there is no happiness without action.", author: "William James" },
            { text: "The art of being wise is the art of knowing what to overlook.", author: "William James" },
            { text: "Whenever you find yourself on the side of the majority, it is time to pause and reflect.", author: "Mark Twain" },
            { text: "The two most important days in your life are the day you are born and the day you find out why.", author: "Mark Twain" },
            { text: "Kindness is the language which the deaf can hear and the blind can see.", author: "Mark Twain" },
            { text: "Courage is resistance to fear, mastery of fear, not absence of fear.", author: "Mark Twain" },
            { text: "The best way to cheer yourself up is to try to cheer somebody else up.", author: "Mark Twain" },
            { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison" },
            { text: "Genius is one percent inspiration and ninety-nine percent perspiration.", author: "Thomas Edison" },
            { text: "Our greatest weakness lies in giving up. The most certain way to succeed is always to try just one more time.", author: "Thomas Edison" },
            { text: "There is no substitute for hard work.", author: "Thomas Edison" },
            { text: "What you are will show in what you do.", author: "Thomas Edison" },
        ];

        // ===== DOM ELEMENTS =====
        const contentCard = document.getElementById('contentCard');
        const contentText = document.getElementById('contentText');
        const contentAuthor = document.getElementById('contentAuthor');
        const jokePunchline = document.getElementById('jokePunchline');
        const cardIcon = document.getElementById('cardIcon');
        const newContentBtn = document.getElementById('newContentBtn');
        const copyBtn = document.getElementById('copyBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const headerSubtitle = document.getElementById('headerSubtitle');
        const navCounter = document.getElementById('navCounter');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        const quoteTab = document.getElementById('quoteTab');
        const jokeTab = document.getElementById('jokeTab');
        const toast = document.getElementById('toast');

        // ===== SHUFFLE ARRAY (Fisher-Yates) =====
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ===== FILL BUFFER WITH UNIQUE CONTENT =====
        async function fillQuoteBuffer() {
            const unseen = shuffleArray(fallbackQuotes).filter(q => !seenQuoteTexts.has(q.text));
            
            if (isQuoteApiAvailable && unseen.length < BUFFER_SIZE) {
                try {
                    const fetchPromises = [];
                    for (let i = 0; i < 5; i++) {
                        fetchPromises.push(
                            fetch('https://api.quotable.io/random?maxLength=150')
                                .then(res => res.ok ? res.json() : null)
                                .catch(() => null)
                        );
                    }
                    const results = await Promise.all(fetchPromises);
                    
                    for (const data of results) {
                        if (data && data.content && !seenQuoteTexts.has(data.content)) {
                            quoteBuffer.push({ text: data.content, author: data.author });
                            seenQuoteTexts.add(data.content);
                        }
                    }
                } catch (error) {
                    console.log('Batch quote fetch failed, using fallback.');
                    isQuoteApiAvailable = false;
                }
            }

            for (const quote of unseen) {
                if (quoteBuffer.length >= BUFFER_SIZE * 2) break;
                if (!seenQuoteTexts.has(quote.text)) {
                    quoteBuffer.push(quote);
                    seenQuoteTexts.add(quote.text);
                }
            }

            if (quoteBuffer.length === 0) {
                seenQuoteTexts.clear();
                const fresh = shuffleArray(fallbackQuotes);
                quoteBuffer = fresh.slice(0, BUFFER_SIZE);
                fresh.slice(0, BUFFER_SIZE).forEach(q => seenQuoteTexts.add(q.text));
            }
        }

        function fillJokeBuffer() {
            const fallbackJokes = [
                { setup: "Why don't scientists trust atoms?", punchline: "Because they make up everything!" },
                { setup: "What do you call a fake noodle?", punchline: "An impasta!" },
                { setup: "Why did the scarecrow win an award?", punchline: "Because he was outstanding in his field!" },
                { setup: "What do you call a bear with no teeth?", punchline: "A gummy bear!" },
                { setup: "Why don't eggs tell jokes?", punchline: "They'd crack each other up!" },
                { setup: "What did the ocean say to the beach?", punchline: "Nothing, it just waved!" },
                { setup: "Why did the bicycle fall over?", punchline: "Because it was two-tired!" },
                { setup: "What do you call cheese that isn't yours?", punchline: "Nacho cheese!" },
                { setup: "Why can't your nose be 12 inches long?", punchline: "Because then it would be a foot!" },
                { setup: "What did the left eye say to the right eye?", punchline: "Between you and me, something smells!" },
                { setup: "How do you organize a space party?", punchline: "You planet!" },
                { setup: "What do you call a cow with no legs?", punchline: "Ground beef!" },
                { setup: "Why did the coffee file a police report?", punchline: "It got mugged!" },
                { setup: "What's orange and sounds like a parrot?", punchline: "A carrot!" },
                { setup: "How does a penguin build its house?", punchline: "Igloos it together!" },
                { setup: "What do you call a fish wearing a bowtie?", punchline: "Sofishticated!" },
                { setup: "Why did the math book look so sad?", punchline: "Because it had too many problems!" },
                { setup: "What do you call a dog that can do magic?", punchline: "A Labracadabrador!" },
                { setup: "Why don't skeletons fight each other?", punchline: "They don't have the guts!" },
                { setup: "What do you call an elephant that doesn't matter?", punchline: "An irrelephant!" },
                { setup: "Why did the cookie go to the hospital?", punchline: "Because it felt crummy!" },
                { setup: "What do you call a boomerang that won't come back?", punchline: "A stick!" },
                { setup: "Why was the belt arrested?", punchline: "Because it held up a pair of pants!" },
                { setup: "What's the best thing about Switzerland?", punchline: "I don't know, but the flag is a big plus!" },
                { setup: "Why do we tell actors to break a leg?", punchline: "Because every play has a cast!" },
                { setup: "What did the janitor say when he jumped out of the closet?", punchline: "Supplies!" },
                { setup: "How do you make holy water?", punchline: "You boil the hell out of it!" },
                { setup: "What's a skeleton's favorite instrument?", punchline: "A trom-bone!" },
                { setup: "What's brown and sticky?", punchline: "A stick!" },
                { setup: "Why did the chicken join a band?", punchline: "Because it had the drumsticks!" },
                { setup: "What do you call a sleeping dinosaur?", punchline: "A dino-snore!" },
                { setup: "Why are elevator jokes so good?", punchline: "They work on so many levels!" },
                { setup: "What did one wall say to the other?", punchline: "I'll meet you at the corner!" },
                { setup: "Why did the banana go to the doctor?", punchline: "It wasn't peeling well!" },
                { setup: "How do you catch a squirrel?", punchline: "Climb a tree and act like a nut!" },
                { setup: "What do you call a parade of rabbits hopping backwards?", punchline: "A receding hare-line!" },
                { setup: "Why don't programmers like nature?", punchline: "It has too many bugs!" },
                { setup: "What did the digital clock say to the grandfather clock?", punchline: "Look grandpa, no hands!" },
                { setup: "Why did the stadium get so hot?", punchline: "All the fans left!" },
            ];

            const shuffled = shuffleArray(fallbackJokes);
            jokeBuffer = shuffled.filter(j => !seenJokeIds.has(j.setup));
            
            if (jokeBuffer.length === 0) {
                seenJokeIds.clear();
                jokeBuffer = shuffleArray(fallbackJokes);
            }
            
            jokeBuffer.forEach(j => seenJokeIds.add(j.setup));
        }

        function popFromBuffer() {
            if (currentMode === 'quotes') {
                if (quoteBuffer.length < 3) fillQuoteBuffer();
                const item = quoteBuffer.shift();
                quoteHistory.push(item);
                currentQuoteIndex = quoteHistory.length - 1;
            } else {
                if (jokeBuffer.length < 3) fillJokeBuffer();
                const item = jokeBuffer.shift();
                jokeHistory.push(item);
                currentJokeIndex = jokeHistory.length - 1;
            }
        }

        function updateDisplay() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            if (history.length === 0 || index < 0) return;
            const item = history[index];
            if (currentMode === 'quotes') {
                contentText.textContent = item.text;
                contentAuthor.textContent = `— ${item.author}`;
                contentAuthor.style.display = 'block';
                jokePunchline.style.display = 'none';
                contentText.style.fontStyle = 'italic';
            } else {
                contentText.textContent = item.setup;
                jokePunchline.textContent = item.punchline;
                contentAuthor.style.display = 'none';
                jokePunchline.style.display = 'block';
                contentText.style.fontStyle = 'normal';
            }
            updateNavButtons();
            updateCounter();
        }

        function updateNavButtons() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            prevArrow.disabled = index <= 0;
            nextArrow.disabled = index >= history.length - 1;
        }

        function updateCounter() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            navCounter.textContent = history.length === 0 ? '0 / 0' : `${index + 1} / ${history.length}`;
        }

        function goToPrevious() {
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            if (index <= 0) return;
            contentCard.classList.add('swipe-right');
            setTimeout(() => {
                if (currentMode === 'quotes') currentQuoteIndex--;
                else currentJokeIndex--;
                updateDisplay();
                contentCard.classList.remove('swipe-right');
                contentCard.classList.add('swipe-from-left');
                requestAnimationFrame(() => {
                    contentCard.classList.remove('swipe-from-left');
                    contentCard.classList.add('snap-back');
                    setTimeout(() => contentCard.classList.remove('snap-back'), 300);
                });
            }, 300);
        }

        function goToNext() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            if (index >= history.length - 1) {
                getNewContent();
                return;
            }
            contentCard.classList.add('swipe-left');
            setTimeout(() => {
                if (currentMode === 'quotes') currentQuoteIndex++;
                else currentJokeIndex++;
                updateDisplay();
                contentCard.classList.remove('swipe-left');
                contentCard.classList.add('swipe-from-right');
                requestAnimationFrame(() => {
                    contentCard.classList.remove('swipe-from-right');
                    contentCard.classList.add('snap-back');
                    setTimeout(() => contentCard.classList.remove('snap-back'), 300);
                });
            }, 300);
        }

        function switchMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            if (mode === 'quotes') {
                quoteTab.classList.add('active');
                jokeTab.classList.remove('active');
                quoteTab.classList.remove('joke-active');
                jokeTab.classList.remove('joke-active');
                newContentBtn.textContent = '✨ New Quote';
                newContentBtn.className = 'btn btn-primary';
                headerSubtitle.textContent = 'Swipe to explore • Quotes that inspire, jokes that buzz';
                cardIcon.textContent = '"';
                cardIcon.className = 'card-icon quote-icon';
            } else {
                jokeTab.classList.add('active');
                quoteTab.classList.remove('active');
                jokeTab.classList.add('joke-active');
                quoteTab.classList.remove('joke-active');
                newContentBtn.textContent = '😂 New Joke';
                newContentBtn.className = 'btn btn-joke';
                headerSubtitle.textContent = 'Swipe to explore • Get the buzz going with laughter';
                cardIcon.textContent = '😂';
                cardIcon.className = 'card-icon joke-icon';
            }
            updateDisplay();
        }

        async function getNewContent() {
            newContentBtn.disabled = true;
            newContentBtn.textContent = 'Loading...';
            loadingSpinner.style.display = 'block';
            if (currentMode === 'quotes' && quoteBuffer.length === 0) await fillQuoteBuffer();
            else if (currentMode === 'jokes' && jokeBuffer.length === 0) fillJokeBuffer();
            popFromBuffer();
            updateDisplay();
            newContentBtn.disabled = false;
            newContentBtn.textContent = currentMode === 'quotes' ? '✨ New Quote' : '😂 New Joke';
            loadingSpinner.style.display = 'none';
        }

        function copyContent() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            if (history.length === 0 || index < 0) return;
            const item = history[index];
            let copyMessage = currentMode === 'quotes' ? `"${item.text}" — ${item.author}` : `😂 ${item.setup}\n${item.punchline}`;
            navigator.clipboard.writeText(copyMessage).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.textContent = '✅ Copied!';
                toast.classList.add('show');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = '📋 Copy';
                    toast.classList.remove('show');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = copyMessage;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyBtn.classList.add('copied');
                copyBtn.textContent = '✅ Copied!';
                toast.classList.add('show');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = '📋 Copy';
                    toast.classList.remove('show');
                }, 2000);
            });
        }

        function shareContent() {
            let history = currentMode === 'quotes' ? quoteHistory : jokeHistory;
            let index = currentMode === 'quotes' ? currentQuoteIndex : currentJokeIndex;
            if (history.length === 0 || index < 0) return;
            const item = history[index];
            let shareMessage = currentMode === 'quotes' ? `"${item.text}" — ${item.author}` : `😂 ${item.setup}\n${item.punchline}`;
            if (navigator.share) {
                navigator.share({ title: 'Buzzly', text: shareMessage, url: window.location.href }).catch(() => {});
            } else {
                copyContent();
            }
        }

        // Touch swipe handling
        let touchStartX = 0, touchStartY = 0, touchCurrentX = 0, isDragging = false;
        const SWIPE_THRESHOLD = 80;

        contentCard.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isDragging = false;
            contentCard.classList.add('swiping');
        }, { passive: true });

        contentCard.addEventListener('touchmove', (e) => {
            if (touchStartX === 0) return;
            touchCurrentX = e.touches[0].clientX;
            const deltaX = touchCurrentX - touchStartX;
            const deltaY = e.touches[0].clientY - touchStartY;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                isDragging = true;
                contentCard.style.transform = `translateX(${deltaX}px)`;
                contentCard.style.opacity = 1 - Math.abs(deltaX) / 400;
            }
        }, { passive: true });

        contentCard.addEventListener('touchend', () => {
            const deltaX = touchCurrentX - touchStartX;
            contentCard.classList.remove('swiping');
            contentCard.style.transform = '';
            contentCard.style.opacity = '';
            if (!isDragging) { touchStartX = 0; touchCurrentX = 0; return; }
            if (deltaX < -SWIPE_THRESHOLD) goToNext();
            else if (deltaX > SWIPE_THRESHOLD) goToPrevious();
            touchStartX = 0; touchCurrentX = 0; isDragging = false;
        });

        document.addEventListener('keydown', (event) => {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
            if (event.code === 'ArrowLeft') { event.preventDefault(); goToPrevious(); }
            if (event.code === 'ArrowRight') { event.preventDefault(); goToNext(); }
            if (event.code === 'Space') { event.preventDefault(); getNewContent(); }
            if (event.code === 'KeyQ' && currentMode !== 'quotes') switchMode('quotes');
            if (event.code === 'KeyJ' && currentMode !== 'jokes') switchMode('jokes');
            if (event.code === 'KeyC' && event.ctrlKey) { event.preventDefault(); copyContent(); }
        });

        window.addEventListener('DOMContentLoaded', async () => {
            await fillQuoteBuffer();
            fillJokeBuffer();
            getNewContent();
        });
    </script>

</body>
